<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modèles 3D pour Bureau d'études — Stéphane AUER</title>
<link href="https://fonts.googleapis.com/css2?family=Gloock:ital@0;1&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#252220;--bg2:#2E2A26;--c:#EAE2CC;--dim:rgba(234,226,204,.38);--a:#C06820;--a2:#E08840;--ln:rgba(234,226,204,.07)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:auto}
body{background:var(--bg);color:var(--c);font-family:'Outfit',sans-serif;font-weight:300;overflow-x:hidden;cursor:none}
body::before{content:'';position:fixed;inset:0;z-index:1000;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px}
#cur{position:fixed;top:0;left:0;z-index:10002;pointer-events:none}
#cur-dot{width:8px;height:8px;background:var(--c);border-radius:50%;position:absolute;transform:translate(-50%,-50%)}
#cur-ring{width:40px;height:40px;border:1px solid rgba(234,226,204,.3);border-radius:50%;position:absolute;transform:translate(-50%,-50%);transition:width .45s cubic-bezier(.76,0,.24,1),height .45s,border-color .35s}
#cur-ring.ch{width:70px;height:70px;border-color:rgba(192,104,32,.6)}
header.site-banner{position:fixed;top:0;left:0;right:0;z-index:10001;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:0 4rem;min-height:56px;background:var(--bg);border-bottom:1px solid rgba(234,226,204,1);box-shadow:0 2px 20px rgba(0,0,0,.3)}
header.site-banner .banner-brand{justify-self:start;grid-column:1;font-family:'Gloock',serif;font-size:23px;font-weight:700;font-style:italic;color:var(--c);text-decoration:none;letter-spacing:.06em}
header.site-banner .banner-nav-main{justify-self:center;grid-column:2}
header.site-banner .banner-nav-extra{justify-self:end;grid-column:3}
header.site-banner .banner-nav{display:flex;gap:.5rem;list-style:none;margin:0;padding:0;justify-content:center;flex-wrap:wrap}
header.site-banner .banner-nav-extra .banner-nav{justify-content:flex-end}
header.site-banner .banner-nav a{display:inline-block;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--c);text-decoration:none;padding:.6rem 1.5rem;font-weight:500;background:transparent;border:1px solid rgba(234,226,204,.25);border-radius:4px;transition:background .25s,border-color .25s,color .25s}
header.site-banner .banner-nav a:hover{background:rgba(234,226,204,.12);border-color:rgba(234,226,204,.5);color:var(--c)}
header.site-banner .banner-nav a[aria-current="page"]{background:rgba(192,104,32,.2);border-color:rgba(192,104,32,.55);color:var(--c)}
.be-main{--be-pad-x:4rem;padding:9.5rem var(--be-pad-x) 5rem;min-height:calc(100vh - 56px);border-top:1px solid var(--ln)}
.be-intro{max-width:100%;margin-bottom:3.5rem}
.be-h1{font-family:'Gloock',serif;font-style:italic;font-size:clamp(1.35rem,2.65vw,2.85rem);line-height:1.12;letter-spacing:-.02em;margin-bottom:1.25rem;white-space:nowrap}
.be-lead{font-size:1.05rem;color:var(--dim);line-height:1.85;max-width:720px}
/* ═══ Blocs projets (même grille et largeur à l’écran que l’accueil) ═══ */
#portfolio-be{margin-left:calc(-1 * var(--be-pad-x));margin-right:calc(-1 * var(--be-pad-x));width:calc(100% + 2 * var(--be-pad-x));box-sizing:border-box}
.overlap-projects{border-top:1px solid rgba(234,226,204,.2);margin-top:3rem}
.op-item{position:relative;padding:6rem 0;border-bottom:1px solid var(--ln)}
.op-num{display:none}
.op-inner{position:relative;z-index:2;display:grid;align-items:center;gap:0}
.op-item:nth-child(odd) .op-inner{grid-template-columns:56% 44%;padding:0 4rem 0 4rem}
.op-item:nth-child(even) .op-inner{grid-template-columns:44% 56%;padding:0 4rem 0 4rem}
.op-item:nth-child(even) .op-info{order:1}
.op-item:nth-child(even) .op-img{order:2}
.op-img{position:relative;overflow:hidden;background:var(--bg2);aspect-ratio:16/9;border:1px solid rgba(233,225,203,.4);box-shadow:0 0 10px 4px rgba(0,0,0,.25)}
.op-img-inner{width:100%;height:100%;clip-path:inset(0 100% 0 0);transition:clip-path 1.3s cubic-bezier(.76,0,.24,1)}
.op-img-inner.open{clip-path:inset(0 0% 0 0)}
.op-img-inner img{width:100%;height:100%;object-fit:contain;filter:brightness(.55) saturate(.8);transform:scale(1);transition:filter .5s,transform .35s ease-out}
.op-item.frame-hover .op-img-inner img{filter:brightness(.75) saturate(1)}
.op-img-inner.zoom-hover img{transform:scale(1.06)}
#portfolio-be .op-img{aspect-ratio:16/10;min-height:min(52vh,520px)}
#portfolio-be .op-img-inner{position:relative;height:100%;min-height:100%}
#portfolio-be .op-img .be-viewport{position:absolute;inset:0;width:100%;height:100%;min-height:0;aspect-ratio:unset;border:none;box-shadow:none;background:var(--bg2)}
.op-item:nth-child(even) .op-img-inner{clip-path:inset(0 0 0 100%)}
.op-item:nth-child(even) .op-img-inner.open{clip-path:inset(0 0 0 0%)}
.op-img::before{content:'';position:absolute;inset-block:0;left:0;width:3px;background:var(--a);z-index:3;opacity:0;transition:opacity .3s}
.op-item:nth-child(even) .op-img::before{left:auto;right:0}
.op-img.revealing::before{opacity:1;animation:stripe 1.3s cubic-bezier(.76,0,.24,1) forwards}
@keyframes stripe{0%{transform:scaleY(0);opacity:1}40%{transform:scaleY(1);opacity:1}100%{transform:scaleY(1);opacity:0}}
.op-item:nth-child(odd) .op-info{padding-left:5rem}
.op-item:nth-child(even) .op-info{padding-left:5rem;padding-right:0}
.op-cat{font-size:.93rem;letter-spacing:.28em;text-transform:uppercase;color:var(--a);margin-bottom:1rem;opacity:0;transform:translateY(14px);transition:opacity .6s .15s,transform .6s .15s}
.op-item.inview .op-cat{opacity:1;transform:translateY(0)}
.op-title{font-family:'Gloock',serif;font-style:italic;font-size:clamp(2.2rem,4.5vw,4.5rem);line-height:.95;width:505px;max-width:100%;opacity:0;transform:translateY(20px);transition:opacity .8s .25s,transform .8s .25s}
.op-item.inview .op-title{opacity:1;transform:translateY(0)}
.op-rule{width:0;height:1px;background:var(--a);margin:2rem 0;transition:width .9s .4s cubic-bezier(.76,0,.24,1)}
.op-item.inview .op-rule{width:40px}
.op-desc{font-size:1.275rem;color:var(--dim);line-height:1.9;max-width:480px;opacity:0;transform:translateY(12px);transition:opacity .6s .5s,transform .6s .5s}
.op-desc-visu{text-decoration:underline;text-underline-offset:.18em;text-decoration-color:rgba(192,104,32,.85)}
.op-item.inview .op-desc{opacity:1;transform:translateY(0)}
.be-viewport{position:relative;width:100%;min-height:min(62vh,560px);aspect-ratio:16/10;background:var(--bg2);border:1px solid rgba(233,225,203,.35);box-shadow:0 0 12px 4px rgba(0,0,0,.22);overflow:hidden}
.be-viewport canvas{display:block;width:100%!important;height:100%!important;touch-action:none}
.be-viewport.be-loading::after{content:'Chargement…';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dim);pointer-events:none}
.be-viewport.be-error{display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;font-size:.9rem;color:var(--dim);line-height:1.6}
footer{background:var(--bg);border-top:1px solid var(--ln);padding:2.8rem 4rem;display:flex;align-items:center;justify-content:space-between}
.foot-logo{font-family:'Gloock',serif;font-style:italic;font-size:1rem;letter-spacing:.02em;color:var(--dim);text-decoration:none}
.foot-links{display:flex;gap:2rem;list-style:none}
.foot-links a{font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;color:var(--dim);text-decoration:none;transition:color .3s}
.foot-links a:hover{color:var(--a)}
.foot-copy{font-size:.6rem;color:rgba(234,226,204,.18)}
@media(max-width:900px){header.site-banner{padding:0 2rem;min-height:56px;grid-template-columns:1fr auto 1fr;padding-top:.5rem;padding-bottom:.5rem}.banner-nav a{padding:.5rem 1rem;font-size:.62rem}.be-main{--be-pad-x:2rem;padding:6.5rem 2rem 3rem}.be-h1{white-space:normal;font-size:clamp(1.35rem,4.8vw,2.1rem);line-height:1.15}.op-inner,.op-item:nth-child(odd) .op-inner,.op-item:nth-child(even) .op-inner{grid-template-columns:1fr;padding:0 2rem}.op-item:nth-child(odd) .op-info,.op-item:nth-child(even) .op-info{padding:2rem 0 0}.op-item{padding:3rem 0}footer{flex-direction:column;gap:2rem;text-align:center}body{cursor:auto}#cur{display:none}}
</style>
</head>
<body>
<div id="cur"><div id="cur-dot"></div><div id="cur-ring"></div></div>
<header class="site-banner">
  <a class="banner-brand" href="index.html">Stéphane AUER</a>
  <nav class="banner-nav-main" aria-label="Sections principales">
    <ul class="banner-nav">
      <li><a href="index.html">Architecture/Archviz</a></li>
      <li><a href="bureau-etudes.html" aria-current="page">Bureau d'études</a></li>
    </ul>
  </nav>
  <nav class="banner-nav-extra" aria-label="Informations">
    <ul class="banner-nav">
      <li><a href="index.html#services">Services</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>
</header>

<main class="be-main">
  <div class="be-intro">
    <h1 class="be-h1">Modèles 3D pour Bureau d'études</h1>
    <p class="be-lead">Visualisations interactives des volumes réalisés sous SketchUp.</p>
  </div>

  <div class="overlap-projects" id="portfolio-be" aria-label="Modèles 3D bureau d'études"></div>
</main>

<footer>
  <a class="foot-logo" href="index.html">Stéphane AUER</a>
  <ul class="foot-links">
    <li><a href="#">Mentions légales</a></li>
    <li><a href="#">Confidentialité</a></li>
    <li><a href="index.html#contact">Contact</a></li>
  </ul>
  <p class="foot-copy">© 2026 Stéphane AUER</p>
</footer>

<script>
(function(){const dot=document.getElementById('cur-dot'),ring=document.getElementById('cur-ring');if(!dot||!ring)return;let mx=0,my=0,rx=0,ry=0;document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px';});(function lc(){rx+=(mx-rx)*.1;ry+=(my-ry)*.1;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(lc);})();document.querySelectorAll('a, button').forEach(el=>{el.addEventListener('mouseenter',()=>ring.classList.add('ch'));el.addEventListener('mouseleave',()=>ring.classList.remove('ch'));});})();
</script>
<script type="module" src="/js/bureau-etudes.js"></script>
</body>
</html>
